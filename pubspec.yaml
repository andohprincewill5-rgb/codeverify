name: codeverify
description: A mobile app to scan and verify codes against a registry.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  permission_handler: ^11.3.0
  cupertino_icons: ^1.0.2
  mobile_scanner: ^7.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
